<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexy Dashboard</title>

<link rel="stylesheet" href="/css/style.css">

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #020617;
}

.container {
  padding: 30px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.cards-resumo {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.resumo-card {
  background: #020617;
  padding: 18px;
  border-radius: 10px;
  border: 1px solid #334155;
}

.resumo-card h3 {
  margin: 0;
  font-size: 14px;
  color: #94a3b8;
}

.resumo-card p {
  font-size: 26px;
  font-weight: bold;
  margin: 10px 0 0;
}

button {
  padding: 10px;
  margin: 5px;
  background: #3b82f6;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

input {
  border: none;
  border-radius: 6px;
}

.badge {
  background: #2563eb;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>🚀 Nexy</div>
  <div>
    <span id="user"></span>
    <span class="badge" id="tipoUsuario"></span>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2 id="welcome"></h2>
    <p>Gerencie suas reuniões, salas, chat com IA e recursos do sistema.</p>
  </div>

  <div class="cards-resumo">
    <div class="resumo-card">
      <h3>Usuários</h3>
      <p id="totalUsuarios">0</p>
    </div>

    <div class="resumo-card">
      <h3>Salas</h3>
      <p id="totalSalas">0</p>
    </div>

    <div class="resumo-card">
      <h3>Reuniões</h3>
      <p id="totalReunioes">0</p>
    </div>

    <div class="resumo-card">
      <h3>Soma Mensagens</h3>
      <p id="totalMensagens">0</p>
    </div>

    <div class="resumo-card">
      <h3>Média Msg/Reunião</h3>
      <p id="mediaMensagens">0</p>
    </div>
  </div>

  <div class="card">
    <h3>Reuniões</h3>

    <button onclick="criarSala()">Criar reunião</button>
    <button onclick="entrarSala()">Entrar com código</button>

    <div id="areaReuniao"></div>
  </div>

  <div class="card" id="areaAdmin">
    <h3>Área Administrativa</h3>

    <button onclick="window.location.href='/usuarios'">
      Gerenciar Usuários
    </button>

    <button onclick="window.location.href='/salas'">
      Gerenciar Salas
    </button>

    <button onclick="window.location.href='/relatorio_reunioes'">
      Relatório de Reuniões
    </button>
  </div>

  <div class="card">
    <h3>Inteligência Artificial</h3>

    <button onclick="window.location.href='/chatpage'">
      Chat IA
    </button>
  </div>

  <div class="card">
    <h3>Sistema</h3>

    <button onclick="window.location.href='/sobre'">
      Sobre o Nexy
    </button>

    <button onclick="logout()">
      Sair
    </button>
  </div>

</div>

<script>
const usuario = localStorage.getItem("usuario");
const tipoUsuario = localStorage.getItem("tipo_usuario") || "usuario";

if (!usuario) {
  window.location.href = "/loginpage";
}

document.getElementById("user").innerText = usuario;
document.getElementById("tipoUsuario").innerText = tipoUsuario;
document.getElementById("welcome").innerText = "Bem-vindo, " + usuario;

if (tipoUsuario !== "admin") {
  document.getElementById("areaAdmin").style.display = "none";
}

async function carregarResumo() {
  try {
    const res = await fetch("/dashboard_stats");
    const data = await res.json();

    if (data.status === "ok") {
      document.getElementById("totalUsuarios").innerText = data.total_usuarios;
      document.getElementById("totalSalas").innerText = data.total_salas;
      document.getElementById("totalReunioes").innerText = data.total_reunioes;
      document.getElementById("totalMensagens").innerText = data.soma_mensagens;
      document.getElementById("mediaMensagens").innerText = data.media_mensagens;
    }
  } catch (erro) {
    console.log("Erro ao carregar resumo:", erro);
  }
}

async function criarSala() {
  const res = await fetch("/criar_reuniao");
  const data = await res.json();

  if (data.status !== "ok") {
    alert(data.msg || "Erro ao criar reunião.");
    return;
  }

  document.getElementById("areaReuniao").innerHTML = `
    <div class="card">
      <h3>🚀 Sala criada</h3>

      <input 
        type="text" 
        value="${data.link}" 
        id="linkInput" 
        readonly 
        style="width:100%; padding:10px; margin:10px 0;"
      >

      <button onclick="copiarLink()">Copiar link</button>
      <button onclick="window.location.href='${data.link}'">Entrar</button>
    </div>
  `;

  carregarResumo();
}

function entrarSala() {
  const entrada = prompt("Cole o código ou link:");

  if (!entrada) return;

  if (entrada.includes("http")) {
    window.location.href = entrada;
  } else {
    window.location.href = "/meeting/" + entrada;
  }
}

function copiarLink() {
  const input = document.getElementById("linkInput");

  if (!input) return;

  navigator.clipboard.writeText(input.value);
  alert("Link copiado!");
}

function logout() {
  localStorage.clear();
  window.location.href = "/logout";
}

carregarResumo();
</script>

</body>
</html>
